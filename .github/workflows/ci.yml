name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[server,dev]"
      # Lint/format/type checks are advisory for now: the codebase has a large
      # pre-existing backlog (ruff: ~93 findings + ~41 files to reformat; mypy is
      # untyped). Run them for visibility without failing the pipeline until a
      # dedicated cleanup lands. Remove continue-on-error once the backlog clears.
      - name: Ruff check
        run: ruff check voidtether/
        continue-on-error: true
      - name: Ruff format check
        run: ruff format --check voidtether/
        continue-on-error: true
      - name: Mypy type check
        run: mypy voidtether/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test (pytest-cov)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Install the server extra too: the suite imports httpx/fastapi
      # (e.g. voidtether.adapters.mcp) and uses pytest-asyncio.
      - run: pip install -e ".[server,dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=voidtether --cov-report=term-missing

  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
